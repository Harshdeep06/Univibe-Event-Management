<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIVIBE - Authentication</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: "#3D56B2",
              secondary: "#5C7AEA",
              bgCanvas: "#F4F6F9",
              card: "#FFFFFF",
              textMain: "#1A1A1A",
              textMuted: "#757575",
            }
          }
        }
      }
    }
  </script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-12 relative overflow-hidden bg-[#F4F6F9] dark:bg-[#111827] text-[#1A1A1A] dark:text-gray-100 transition-colors">
  
  
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-[#3D56B2] opacity-[0.06] blur-[80px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-[#5C7AEA] opacity-[0.06] blur-[80px]"></div>

  
  <div class="flex flex-col items-center mb-8 relative z-10">
    <span class="bg-[#3D56B2] text-white px-5 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider mb-2">
      University Hub
    </span>
    <h1 class="text-4xl font-extrabold tracking-tight text-[#1A1A1A] dark:text-white">
      UNI<span class="text-[#3D56B2]">VIBE</span>
    </h1>
    <p class="text-sm text-[#757575] mt-1 dark:text-gray-400">Unified Campus Event System</p>
  </div>

  
  <div class="bg-gray-200 dark:bg-gray-800 p-1 rounded-full flex gap-1 mb-8 shadow-sm relative z-10 w-full max-w-sm">
    <div id="slider-indicator" class="absolute top-1 left-1 bottom-1 w-[32%] bg-white dark:bg-gray-700 rounded-full shadow transition-all duration-300 ease-in-out"></div>
    
    <button onclick="setRole('student', 0)" class="flex-1 py-2 px-3 rounded-full text-xs font-semibold flex items-center justify-center gap-1.5 relative z-10 text-[#3D56B2] dark:text-white transition-colors duration-300">
      <i data-lucide="user" class="w-3.5 h-3.5"></i> Student
    </button>
    <button onclick="setRole('club_admin', 33.3)" class="flex-1 py-2 px-3 rounded-full text-xs font-semibold flex items-center justify-center gap-1.5 relative z-10 text-[#757575] dark:text-gray-400 transition-colors duration-300">
      <i data-lucide="users" class="w-3.5 h-3.5"></i> Club Head
    </button>
    <button onclick="setRole('super_admin', 66.6)" class="flex-1 py-2 px-3 rounded-full text-xs font-semibold flex items-center justify-center gap-1.5 relative z-10 text-[#757575] dark:text-gray-400 transition-colors duration-300">
      <i data-lucide="shield" class="w-3.5 h-3.5"></i> Admin
    </button>
  </div>

  
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-[24px] shadow-lg border border-white/40 dark:border-gray-700 p-8 md:p-10 relative z-10 glass-card">
    <h2 id="form-title" class="text-xl font-bold mb-1 text-[#1A1A1A] dark:text-white">Student Authentication</h2>
    <p id="form-subtitle" class="text-xs text-[#757575] mb-6 dark:text-gray-400">Please input credentials below.</p>

    
    <div id="error-alert" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-xl text-xs mb-4 border border-red-100 dark:border-red-900/50"></div>

    <form id="auth-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
      
      
      <div id="student-register-fields" class="hidden space-y-4">
        <div>
          <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300 mb-1">Full Name</label>
          <input type="text" id="reg-name" placeholder="Gurpreet Singh" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300 mb-1">Roll Number</label>
            <input type="text" id="reg-roll" placeholder="CS2023001" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300 mb-1">Branch / Department</label>
            <input type="text" id="reg-dept" placeholder="Computer Science" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300 mb-1">Year of Study</label>
          <select id="reg-year" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
      </div>

      
      <div>
        <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300 mb-1">Email Address</label>
        <input type="email" id="auth-email" required placeholder="student@univibe.edu" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
      </div>

      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-xs font-semibold text-[#1A1A1A] dark:text-gray-300">Password</label>
          <button type="button" onclick="alert('Simulated email verification sent. Check Node console log.')" class="text-[10px] text-[#3D56B2] font-semibold hover:underline">Forgot Password?</button>
        </div>
        <input type="password" id="auth-password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/60 dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[#3D56B2] focus:outline-none dark:text-white">
      </div>

      <button type="submit" id="submit-btn" class="w-full py-3 bg-[#3D56B2] hover:bg-[#2C3E8A] text-white text-xs font-semibold rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5 relative overflow-hidden">
        <span>Authenticate</span>
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </form>

    
    <div id="register-toggle-container" class="mt-6 text-center">
      <button onclick="toggleRegisterMode()" id="register-toggle-btn" class="text-xs text-[#3D56B2] font-semibold hover:underline">New student? Register profile</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentRole = 'student';
    let isRegistering = false;

    // Role switcher sliding slider animation logic
    function setRole(role, offsetPercentage) {
      currentRole = role;
      isRegistering = false;
      document.getElementById('error-alert').classList.add('hidden');

      // Update slider capsule position
      const indicator = document.getElementById('slider-indicator');
      indicator.style.left = `calc(${offsetPercentage}% + 4px)`;
      if (offsetPercentage === 0) indicator.style.width = '32%';
      else if (offsetPercentage === 33.3) indicator.style.width = '33%';
      else indicator.style.width = '32%';

      // Update text color classes on buttons
      const buttons = document.querySelectorAll('button[onclick^="setRole"]');
      buttons.forEach((btn, index) => {
        const matchingIndex = (offsetPercentage === 0 && index === 0) || 
                             (offsetPercentage === 33.3 && index === 1) || 
                             (offsetPercentage === 66.6 && index === 2);
        
        if (matchingIndex) {
          btn.className = btn.className.replace('text-[#757575] dark:text-gray-400', 'text-[#3D56B2] dark:text-white');
        } else {
          btn.className = btn.className.replace('text-[#3D56B2] dark:text-white', 'text-[#757575] dark:text-gray-400');
        }
      });

      // Update Form Titles
      const title = document.getElementById('form-title');
      const subtitle = document.getElementById('form-subtitle');
      const placeholder = document.getElementById('auth-email');
      const toggleContainer = document.getElementById('register-toggle-container');

      document.getElementById('student-register-fields').classList.add('hidden');
      document.getElementById('reg-name').required = false;
      document.getElementById('reg-roll').required = false;
      document.getElementById('reg-dept').required = false;

      if (role === 'student') {
        title.innerText = 'Student Authentication';
        placeholder.placeholder = 'student@univibe.edu';
        toggleContainer.classList.remove('hidden');
      } else if (role === 'club_admin') {
        title.innerText = 'Club Head Authentication';
        placeholder.placeholder = 'clubhead@univibe.edu';
        toggleContainer.classList.add('hidden');
      } else {
        title.innerText = 'Super Admin Authentication';
        placeholder.placeholder = 'admin@univibe.edu';
        toggleContainer.classList.add('hidden');
      }
    }

    // Toggle student registration fields
    function toggleRegisterMode() {
      isRegistering = !isRegistering;
      document.getElementById('error-alert').classList.add('hidden');
      
      const registerFields = document.getElementById('student-register-fields');
      const title = document.getElementById('form-title');
      const subtitle = document.getElementById('form-subtitle');
      const btnText = document.querySelector('#submit-btn span');
      const toggleBtn = document.getElementById('register-toggle-btn');

      if (isRegistering) {
        registerFields.classList.remove('hidden');
        document.getElementById('reg-name').required = true;
        document.getElementById('reg-roll').required = true;
        document.getElementById('reg-dept').required = true;

        title.innerText = 'Create Student Profile';
        subtitle.innerText = 'Join UNIVIBE and explore active university life.';
        btnText.innerText = 'Complete Registration';
        toggleBtn.innerText = 'Already have a profile? Login';
      } else {
        registerFields.classList.add('hidden');
        document.getElementById('reg-name').required = false;
        document.getElementById('reg-roll').required = false;
        document.getElementById('reg-dept').required = false;

        title.innerText = 'Student Authentication';
        subtitle.innerText = 'Please input credentials below.';
        btnText.innerText = 'Authenticate';
        toggleBtn.innerText = 'New student? Register profile';
      }
    }

    // Form Submit handling
    async function handleFormSubmit(e) {
      e.preventDefault();
      const alertBox = document.getElementById('error-alert');
      alertBox.classList.add('hidden');

      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;

      try {
        if (isRegistering && currentRole === 'student') {
          const name = document.getElementById('reg-name').value;
          const rollNumber = document.getElementById('reg-roll').value;
          const department = document.getElementById('reg-dept').value;
          const yearOfStudy = document.getElementById('reg-year').value;

          const res = await fetchAPI('/auth/register', {
            method: 'POST',
            body: JSON.stringify({ name, email, password, rollNumber, department, yearOfStudy: Number(yearOfStudy) })
          });

          localStorage.setItem('univibe_token', res.token);
          localStorage.setItem('univibe_user', JSON.stringify(res.user));
          window.location.href = '/student';
        } else {
          const res = await fetchAPI('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password, role: currentRole })
          });

          localStorage.setItem('univibe_token', res.token);
          localStorage.setItem('univibe_user', JSON.stringify(res.user));

          // Fetch full context for dashboard redirection
          const profileRes = await fetchAPI('/auth/me');
          if (profileRes.success && profileRes.profile) {
            localStorage.setItem('univibe_profile', JSON.stringify(profileRes.profile));
          }

          if (currentRole === 'super_admin') {
            window.location.href = '/admin';
          } else if (currentRole === 'club_admin') {
            window.location.href = '/club';
          } else {
            window.location.href = '/student';
          }
        }
      } catch (err) {
        alertBox.innerText = err.message || 'Login failed. Check credentials.';
        alertBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<span>${isRegistering ? 'Complete Registration' : 'Authenticate'}</span><i data-lucide="arrow-right" class="w-4 h-4"></i>`;
        lucide.createIcons();
      }
    }

    // Init Lucide Icons on load
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
